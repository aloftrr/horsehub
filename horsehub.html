<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🐴 Horse Hub – Video Upload & Watch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', monospace;
        }
        body {
            background: linear-gradient(145deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f0f0f0;
        }
        .app-layout {
            display: flex;
            min-height: 100vh;
        }
        /* sidebar (compact) */
        .sidebar {
            width: 280px;
            background: rgba(30, 27, 75, 0.9);
            backdrop-filter: blur(12px);
            border-right: 1px solid #facc15;
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar .logo-area h2 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #facc15, #ec489a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.2rem;
        }
        .sidebar .logo-area p {
            font-size: 0.7rem;
            color: #c084fc;
        }
        .admin-panel {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 1.2rem;
            padding: 1rem;
            border: 1px solid #facc15;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        button, .file-label {
            background: #334155;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        button.primary {
            background: #ec489a;
            box-shadow: 0 2px 8px #facc15;
        }
        button.primary:hover {
            background: #be185d;
        }
        input, textarea {
            width: 100%;
            padding: 0.5rem;
            margin: 0.4rem 0;
            background: #1e1b4b;
            border: 1px solid #facc15;
            border-radius: 0.8rem;
            color: white;
            font-size: 0.8rem;
        }
        .admin-login {
            display: flex;
            gap: 0.4rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .admin-login input {
            width: 120px;
            margin: 0;
        }
        .status-badge {
            background: #ec489a;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
        }
        /* main content */
        .main-content {
            flex: 1;
            padding: 1.5rem 2rem;
        }
        .main-content h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #facc15, #ec489a);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        /* search bar styling */
        .search-container {
            margin: 1rem 0 2rem 0;
        }
        .search-wrapper {
            display: flex;
            align-items: center;
            background: #1e1b4b;
            border: 1px solid #facc15;
            border-radius: 3rem;
            padding: 0.3rem 0.8rem;
            transition: 0.2s;
        }
        .search-wrapper:focus-within {
            border-color: #ec489a;
            box-shadow: 0 0 8px #ec489a;
        }
        .search-wrapper i {
            color: #facc15;
            font-size: 1.2rem;
            margin-right: 0.5rem;
        }
        #searchInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: white;
            font-size: 1rem;
            padding: 0.6rem 0;
        }
        #searchInput::placeholder {
            color: #aaa;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }
        .video-card {
            background: #1e1b4bcc;
            backdrop-filter: blur(8px);
            border-radius: 1.2rem;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #facc15;
        }
        .video-card:hover {
            transform: translateY(-5px);
            border-color: #ec489a;
        }
        .thumb {
            aspect-ratio: 16/9;
            background: #00000066;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
        }
        .info {
            padding: 0.7rem;
        }
        .info h3 {
            font-size: 0.95rem;
            margin-bottom: 0.2rem;
        }
        .info p {
            font-size: 0.75rem;
            color: #bbb;
            margin: 0.3rem 0;
        }
        .views {
            font-size: 0.7rem;
            color: #facc15;
        }
        .del-btn {
            background: #be123c;
            margin-top: 6px;
            padding: 3px 8px;
            font-size: 0.65rem;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            color: white;
        }
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 2rem;
            background: #1e1b4b66;
            border-radius: 2rem;
            margin-top: 1rem;
        }
        .no-results i {
            font-size: 3rem;
            color: #facc15;
        }
        /* modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: #1e1b4b;
            border-radius: 1.5rem;
            max-width: 90%;
            width: 750px;
            padding: 1rem;
            border: 1px solid #facc15;
        }
        video {
            width: 100%;
            border-radius: 1rem;
            outline: none;
        }
        .close {
            float: right;
            font-size: 1.8rem;
            cursor: pointer;
            margin: 0.5rem;
        }
        footer {
            text-align: center;
            margin-top: 2rem;
            color: #aaa;
            font-size: 0.7rem;
        }
        @media (max-width: 700px) {
            .app-layout {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                border-right: none;
                border-bottom: 1px solid #facc15;
            }
            .main-content {
                padding: 1rem;
            }
        }
    </style>
    <!-- Font Awesome for search icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
<div class="app-layout">
    <!-- SIDEBAR (admin controls) -->
    <div class="sidebar">
        <div class="logo-area">
            <h2>🐴 Horse Hub</h2>
            <p>Admin: Rishiraushan</p>
        </div>
        <div class="admin-panel" id="adminPanel">
            <div class="admin-header">
                <strong>🔐 Admin zone</strong>
                <div id="authWidget"></div>
            </div>
            <div id="uploadForm" style="display: none;">
                <input type="text" id="videoTitle" placeholder="Video title">
                <textarea id="videoDesc" placeholder="Description" rows="2"></textarea>
                <input type="text" id="videoTags" placeholder="Tags (comma separated, e.g., race, stallion, training)">
                <input type="file" id="videoFile" accept="video/mp4">
                <button id="uploadBtn" class="primary">📤 Upload video</button>
            </div>
        </div>
        <footer style="margin-top: auto; font-size:0.7rem;">
            Videos stored in browser (IndexedDB)
        </footer>
    </div>

    <!-- MAIN CONTENT with search bar -->
    <div class="main-content">
        <h1>🎥 Horse Videos</h1>
        <!-- search bar -->
        <div class="search-container">
            <div class="search-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Search by title, description or tags... (e.g., race, training)">
            </div>
        </div>
        <div id="videoGallery" class="video-grid">Loading...</div>
    </div>
</div>

<!-- video player modal -->
<div id="playerModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <video id="modalVideo" controls></video>
        <h3 id="modalTitle" style="margin-top: 0.8rem;"></h3>
        <p id="modalDesc"></p>
        <span id="modalViews" class="views"></span>
    </div>
</div>

<script>
    // IndexedDB setup
    const DB_NAME = 'HorseHubDB';
    const STORE_NAME = 'videos';
    let db = null;
    const ADMIN_PASSWORD = 'Rishiraushan@199';
    let isAdmin = false;
    let allVideos = []; // cache for fast filtering
    let currentFilter = '';

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(DB_NAME, 3); // version upgrade for tags
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            request.onupgradeneeded = (event) => {
                const dbRef = event.target.result;
                if (!dbRef.objectStoreNames.contains(STORE_NAME)) {
                    dbRef.createObjectStore(STORE_NAME, { keyPath: 'id', autoIncrement: true });
                }
                // existing stores will have new fields automatically when adding
            };
        });
    }

    async function saveVideo(metadata, videoBlob) {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readwrite');
            const store = tx.objectStore(STORE_NAME);
            const record = { ...metadata, videoBlob, views: 0, uploaded: Date.now() };
            const request = store.add(record);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function getAllVideos() {
        return new Promise((resolve, reject) => {
            const tx = db.transaction(STORE_NAME, 'readonly');
            const store = tx.objectStore(STORE_NAME);
            const request = store.getAll();
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function incrementViews(videoId) {
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const video = await new Promise((res) => {
            const req = store.get(videoId);
            req.onsuccess = () => res(req.result);
        });
        if (video) {
            video.views = (video.views || 0) + 1;
            store.put(video);
        }
    }

    async function deleteVideo(videoId) {
        if (!isAdmin) return;
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        store.delete(videoId);
        await tx.complete;
        await refreshVideoCache();
        renderFilteredGrid();
    }

    async function refreshVideoCache() {
        allVideos = await getAllVideos();
    }

    // search filter logic (case-insensitive, partial match on title, description, tags)
    function matchesSearch(video, query) {
        if (!query) return true;
        const q = query.toLowerCase();
        const titleMatch = video.title && video.title.toLowerCase().includes(q);
        const descMatch = video.description && video.description.toLowerCase().includes(q);
        let tagsMatch = false;
        if (video.tags) {
            const tagsLower = video.tags.toLowerCase();
            tagsMatch = tagsLower.includes(q);
        }
        return titleMatch || descMatch || tagsMatch;
    }

    function renderFilteredGrid() {
        const gallery = document.getElementById('videoGallery');
        const filtered = allVideos.filter(v => matchesSearch(v, currentFilter));
        if (filtered.length === 0) {
            gallery.innerHTML = `
                <div class="no-results">
                    <i class="fas fa-horse-head"></i>
                    <h3>🐴 No videos found</h3>
                    <p>Try different keywords like "race", "training", or "stallion"</p>
                </div>`;
            return;
        }
        gallery.innerHTML = filtered.map(v => `
            <div class="video-card" data-id="${v.id}">
                <div class="thumb">🐎 MP4</div>
                <div class="info">
                    <h3>${escapeHtml(v.title)}</h3>
                    <p>${escapeHtml(v.description ? v.description.substring(0, 60) : '')}${v.description && v.description.length > 60 ? '…' : ''}</p>
                    <span class="views">👁️ ${v.views || 0} views</span>
                    ${v.tags ? `<div style="font-size:0.65rem; color:#c084fc; margin-top:4px;">🏷️ ${escapeHtml(v.tags)}</div>` : ''}
                    ${isAdmin ? `<button class="del-btn" data-id="${v.id}">🗑️ Delete</button>` : ''}
                </div>
            </div>
        `).join('');
        // attach event listeners
        document.querySelectorAll('.video-card').forEach(card => {
            const id = Number(card.dataset.id);
            card.addEventListener('click', (e) => {
                if (e.target.classList.contains('del-btn')) return;
                playVideo(id);
            });
            const delBtn = card.querySelector('.del-btn');
            if (delBtn) delBtn.addEventListener('click', (e) => { e.stopPropagation(); if(confirm('Delete this video?')) deleteVideo(id); });
        });
    }

    async function playVideo(videoId) {
        const video = allVideos.find(v => v.id === videoId);
        if (!video) return;
        await incrementViews(videoId);
        await refreshVideoCache(); // update view count in cache
        renderFilteredGrid(); // refresh to show new view count
        
        const modal = document.getElementById('playerModal');
        const videoElem = document.getElementById('modalVideo');
        const titleElem = document.getElementById('modalTitle');
        const descElem = document.getElementById('modalDesc');
        const viewsElem = document.getElementById('modalViews');
        const blobUrl = URL.createObjectURL(video.videoBlob);
        videoElem.src = blobUrl;
        titleElem.innerText = video.title;
        descElem.innerText = video.description || 'No description';
        viewsElem.innerText = `👁️ ${video.views + 1} views`;
        modal.style.display = 'flex';
        const closeModal = () => {
            modal.style.display = 'none';
            videoElem.pause();
            URL.revokeObjectURL(blobUrl);
            videoElem.src = '';
        };
        document.querySelector('#playerModal .close').onclick = closeModal;
        modal.onclick = (e) => { if (e.target === modal) closeModal(); };
    }

    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

    function renderAuthUI() {
        const authDiv = document.getElementById('authWidget');
        const uploadFormDiv = document.getElementById('uploadForm');
        if (isAdmin) {
            authDiv.innerHTML = `<span class="status-badge">✅ Admin</span> <button id="logoutBtn">Logout</button>`;
            uploadFormDiv.style.display = 'block';
            document.getElementById('logoutBtn')?.addEventListener('click', () => { isAdmin = false; renderAuthUI(); renderFilteredGrid(); });
        } else {
            authDiv.innerHTML = `<div class="admin-login"><input type="password" id="adminPassInput" placeholder="Password"><button id="loginBtn">Login</button></div>`;
            uploadFormDiv.style.display = 'none';
            document.getElementById('loginBtn')?.addEventListener('click', () => {
                if (document.getElementById('adminPassInput').value === ADMIN_PASSWORD) {
                    isAdmin = true;
                    renderAuthUI();
                    renderFilteredGrid();
                } else alert('Wrong password');
            });
        }
    }

    async function uploadVideo() {
        if (!isAdmin) return alert('Admin only');
        const title = document.getElementById('videoTitle').value.trim();
        const description = document.getElementById('videoDesc').value.trim();
        const tags = document.getElementById('videoTags').value.trim();
        const fileInput = document.getElementById('videoFile');
        if (!title) return alert('Enter title');
        if (!fileInput.files.length) return alert('Select MP4');
        const file = fileInput.files[0];
        if (file.type !== 'video/mp4') return alert('Only MP4');
        if (file.size > 500*1024*1024) return alert('Max 500MB');
        await saveVideo({ title, description, tags }, file);
        alert('Video uploaded!');
        document.getElementById('videoTitle').value = '';
        document.getElementById('videoDesc').value = '';
        document.getElementById('videoTags').value = '';
        fileInput.value = '';
        await refreshVideoCache();
        renderFilteredGrid();
    }

    // search input handler
    function setupSearch() {
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            currentFilter = e.target.value;
            renderFilteredGrid();
        });
    }

    window.onload = async () => {
        await openDB();
        await refreshVideoCache();
        renderAuthUI();
        renderFilteredGrid();
        setupSearch();
        document.getElementById('uploadBtn')?.addEventListener('click', uploadVideo);
    };
</script>
</body>
</html>
